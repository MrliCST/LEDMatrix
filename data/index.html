<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyMatrix 配网</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
        input, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        label { display: block; margin-top: 10px; }
        button { padding: 10px 20px; margin-top: 15px; background: #0f3460; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>EasyMatrix WiFi 配置</h2>
    <form action="/configwifi" method="POST">
        <label>WiFi 网络:</label>
        <select name="ssid">
            {{WIFI_OPTIONS}}
        </select>
        <label>密码:</label>
        <input type="password" name="pass" value="{{PASS_VALUE}}">
        <label>颜色 (RGB):</label>
        <input type="text" name="color" value="{{RGB_VALUES}}" placeholder="例如: 255,0,0">
        <button type="submit">保存配置</button>
    </form>
</body>
</html>
